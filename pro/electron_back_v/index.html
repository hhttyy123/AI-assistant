<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI语音助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background: #F5F5F5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: white;
      padding: 20px;
      border-bottom: 1px solid #E0E0E0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-title {
      font-size: 20px;
      font-weight: 600;
      color: #333;
    }

    .header-status {
      font-size: 12px;
      color: #52C41A;
      margin-left: auto;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #F5F5F5;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: #F0F0F0;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: #D0D0D0;
      border-radius: 3px;
    }

    .message {
      margin-bottom: 20px;
      display: flex;
      align-items: flex-start;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.assistant {
      justify-content: flex-start;
    }

    .message-content {
      max-width: 60%;
      padding: 12px 16px;
      border-radius: 12px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      word-wrap: break-word;
    }

    .message.user .message-content {
      background: #5E5CE6;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .message-content {
      background: white;
      color: #333;
      border: 1px solid #E0E0E0;
      border-bottom-left-radius: 4px;
    }

    .message.system {
      justify-content: center;
    }

    .message.system .message-content {
      background: #FFF7E6;
      color: #666;
      font-style: italic;
      font-size: 14px;
      max-width: 80%;
    }

    .placeholder {
      text-align: center;
      color: #999;
      font-style: italic;
      padding: 40px;
    }

    .chat-input-container {
      background: white;
      border-top: 1px solid #E0E0E0;
      padding: 20px;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .text-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #E0E0E0;
      border-radius: 24px;
      font-size: 16px;
      outline: none;
      transition: all 0.3s;
      background: #F8F9FA;
    }

    .text-input:focus {
      border-color: #5E5CE6;
      box-shadow: 0 0 0 2px rgba(94, 92, 230, 0.1);
      background: white;
    }

    .text-input::placeholder {
      color: #999;
    }

    .control-buttons {
      display: flex;
      gap: 8px;
    }

    .record-btn, .send-btn {
      background: #5E5CE6;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 24px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 100px;
      justify-content: center;
    }

    .record-btn:hover, .send-btn:hover {
      background: #4840C8;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(94, 92, 230, 0.3);
    }

    .record-btn.recording {
      background: #FF4D4F;
      animation: pulse 1.5s infinite;
    }

    .send-btn:disabled {
      background: #D0D0D0;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 77, 79, 0.7);
      }
      70% {
        box-shadow: 0 0 0 10px rgba(255, 77, 79, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(255, 77, 79, 0);
      }
    }

    </style>
</head>
<body>
  <div class="chat-header">
    <span class="header-title">🎤 AI语音助手</span>
    <span class="header-status">● 在线</span>
  </div>

  <div id="chatMessages" class="chat-messages">
    <div class="placeholder">
      <div>👋 你好！我是AI语音助手</div>
      <div style="margin-top: 8px; font-size: 14px; color: #666;">
        你可以通过语音或文字与我对话
      </div>
    </div>
  </div>

  <div class="chat-input-container">
    <div class="input-wrapper">
      <input type="text" id="textInput" class="text-input" placeholder="在这里输入文字，或使用语音输入...">
      <div class="control-buttons">
        <button id="recordBtn" class="record-btn">
          <span>🎙️</span>
          <span>开始录音</span>
        </button>
        <button id="sendBtn" class="send-btn" disabled>
          <span>💬</span>
          <span>发送</span>
        </button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
